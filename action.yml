name: "RedRays ABAP Security Scanner"
description: "Scan ABAP source for security vulnerabilities via the RedRays MC agent API (/agent/v1). Supports SARIF for GitHub code scanning."
author: "RedRays"
branding:
  icon: "shield"
  color: "red"

inputs:
  api-key:
    description: "RedRays developer PAT (X-RedRays-Api-Key). Pass a secret, e.g. ${{ secrets.REDRAYS_TOKEN }}. Never logged."
    required: true
  api-url:
    description: "MC agent base URL ending in /agent/v1 (e.g. https://mc.example.com/agent/v1)."
    required: false
    default: "http://localhost:8080/agent/v1"
  scan-dir:
    description: "Directory searched recursively for *.abap files. Ignored when 'files' is set."
    required: false
    default: "."
  files:
    description: "Comma-separated list of specific ABAP files. Overrides scan-dir when set."
    required: false
    default: ""
  output-format:
    description: "Report format: csv | html | json | sarif. Use 'sarif' to upload to GitHub code scanning."
    required: false
    default: "html"
  output-file:
    description: "Path to write the report to. Leave blank to auto-name with the format's extension (recommended, esp. for sarif)."
    required: false
    default: ""
  fail-on-vulnerabilities:
    description: "Fail the job if any vulnerability is found. Only consulted when 'threshold' is empty."
    required: false
    default: "true"
  threshold:
    description: "Severity gate: critical | high | medium | low | informational. Job fails if any finding is at or above this severity."
    required: false
    default: ""
  scan-profile:
    description: "Scan profile code: QUICK | FULL | CRITICAL | CRITICAL_HIGH. Blank/unknown -> CRITICAL_HIGH default (per MC contract)."
    required: false
    default: "CRITICAL_HIGH"

outputs:
  report-path:
    description: "Actual path of the produced report file."
    value: ${{ steps.scan.outputs.report-path }}
  vulnerabilities-found:
    description: "Total number of findings returned by the scan."
    value: ${{ steps.scan.outputs.vulnerabilities-found }}
  threshold-breached:
    description: "'true' if the severity gate (threshold or fail-on-vulnerabilities) was breached."
    value: ${{ steps.scan.outputs.threshold-breached }}
  scan-id:
    description: "The MC session GUID for this scan."
    value: ${{ steps.scan.outputs.scan-id }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Run RedRays ABAP Security Scanner
      id: scan
      shell: bash
      # The client is vendored in this action and executed from the pinned
      # action path (github.action_path) -- never fetched from a branch at runtime.
      # The token is passed ONLY via the REDRAYS_TOKEN env var: it is never
      # echoed and never placed on the command line.
      env:
        REDRAYS_TOKEN: ${{ inputs.api-key }}
      run: |
        python "${{ github.action_path }}/redrays_scanner.py" \
          --api-url "${{ inputs.api-url }}" \
          --scan-dir "${{ inputs.scan-dir }}" \
          --files "${{ inputs.files }}" \
          --output-format "${{ inputs.output-format }}" \
          --output-file "${{ inputs.output-file }}" \
          --fail-on-vulnerabilities "${{ inputs.fail-on-vulnerabilities }}" \
          --threshold "${{ inputs.threshold }}" \
          --scan-profile "${{ inputs.scan-profile }}"
